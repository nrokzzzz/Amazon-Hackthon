# CampusFlow — microservices stack.
# Kafka (KRaft, single broker) + MongoDB + 6 services (gateway + 5 domain svcs).
# Run:  docker compose up --build
# Public entry: http://localhost:4000 (gateway). Point the frontend + ngrok here.

services:
  # ---- Infrastructure ----
  kafka:
    image: bitnami/kafka:3.7
    container_name: cf-kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  mongo:
    image: mongo:7
    container_name: cf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ---- API gateway (single public entry) ----
  gateway:
    build: ./services/gateway
    container_name: cf-gateway
    env_file: .env
    environment:
      - PORT=4000
      - AUTH_URL=http://auth:8080
      - INTEGRATION_URL=http://integration:8080
      - CATEGORIZER_URL=http://categorizer:8080
      - CHAT_URL=http://chat:8080
      - VOICE_URL=http://voice:8080
    ports:
      - "4000:4000"
    depends_on:
      - auth
      - integration
      - categorizer
      - chat
      - voice

  # ---- Domain services ----
  auth:
    build: ./services/auth
    container_name: cf-auth
    env_file: .env
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/campusflow_auth
    ports:
      - "4001:8080"
    depends_on:
      - mongo

  integration:
    build: ./services/integration
    container_name: cf-integration
    env_file: .env
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/campusflow_integration
      - KAFKA_BROKERS=kafka:9092
    ports:
      - "4002:8080"
    depends_on:
      - mongo
      - kafka

  categorizer:
    build: ./services/categorizer
    container_name: cf-categorizer
    env_file: .env
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/campusflow_digest
      - KAFKA_BROKERS=kafka:9092
      - AUTH_URL=http://auth:8080
    ports:
      - "4003:8080"
    depends_on:
      - mongo
      - kafka
      - auth

  chat:
    build: ./services/chat
    container_name: cf-chat
    env_file: .env
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/campusflow_chat
      - CATEGORIZER_URL=http://categorizer:8080
      - AUTH_URL=http://auth:8080
    ports:
      - "4004:8080"
    depends_on:
      - mongo
      - categorizer
      - auth

  voice:
    build: ./services/voice
    container_name: cf-voice
    env_file: .env
    environment:
      - PORT=8080
    ports:
      - "4005:8080"

volumes:
  kafka_data:
  mongo_data:
